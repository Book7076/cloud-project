<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Typing Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-mono flex items-center justify-center min-h-screen p-4 selection:bg-cyan-900">

    <div class="max-w-md w-full">
        <!-- หน้าจอ Login / Register -->
        <div class="bg-slate-900 border border-slate-800 p-10 rounded-3xl text-center shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="text-5xl mb-6 text-cyan-400">🔐</div>
            <h2 id="auth-title" class="text-3xl font-black mb-6 text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                เข้าสู่ระบบ
            </h2>
            
            <form id="auth-form" class="space-y-4" onsubmit="handleAuth(event)">
                <input type="text" id="username" placeholder="ชื่อผู้ใช้ (Username)" required
                    class="w-full bg-slate-950 border border-slate-700 focus:border-cyan-500 px-4 py-3 rounded-xl text-white outline-none transition-colors" />
                
                <input type="password" id="password" placeholder="รหัสผ่าน (Password)" required
                    class="w-full bg-slate-950 border border-slate-700 focus:border-cyan-500 px-4 py-3 rounded-xl text-white outline-none transition-colors" />
                
                <p id="auth-error" class="text-red-500 text-sm h-4"></p>

                <button type="submit" id="auth-submit-btn" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-8 py-3 rounded-xl font-bold text-lg transition-all shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                    เข้าสู่ระบบ
                </button>
            </form>

            <div class="mt-6 text-slate-400 text-sm">
                <span id="auth-toggle-text">ยังไม่มีบัญชีใช่ไหม?</span>
                <button onclick="toggleAuthMode()" class="text-cyan-400 font-bold hover:underline ml-1 focus:outline-none">
                    <span id="auth-toggle-btn">สมัครสมาชิก</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // เช็คว่าถ้าเคยล็อกอินไว้แล้ว ให้เด้งไปหน้าเกมเลย
        if (localStorage.getItem('username')) {
            window.location.href = '/';
        }

        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-error').innerText = ''; 
            document.getElementById('password').value = ''; 
            
            if (isLoginMode) {
                document.getElementById('auth-title').innerText = 'เข้าสู่ระบบ';
                document.getElementById('auth-submit-btn').innerText = 'เข้าสู่ระบบ';
                document.getElementById('auth-toggle-text').innerText = 'ยังไม่มีบัญชีใช่ไหม?';
                document.getElementById('auth-toggle-btn').innerText = 'สมัครสมาชิก';
            } else {
                document.getElementById('auth-title').innerText = 'สมัครสมาชิกใหม่';
                document.getElementById('auth-submit-btn').innerText = 'ยืนยันการสมัคร';
                document.getElementById('auth-toggle-text').innerText = 'มีบัญชีอยู่แล้ว?';
                document.getElementById('auth-toggle-btn').innerText = 'เข้าสู่ระบบ';
            }
        }

        async function handleAuth(event) {
            event.preventDefault();

            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorElement = document.getElementById('auth-error');

            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            
            try {
                const response = await fetch(`http://localhost:3000${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorElement.innerText = data.error; 
                } else {
                    if (!isLoginMode) {
                        alert('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ');
                        toggleAuthMode(); 
                    } else {
                        // ล็อกอินสำเร็จ -> จำชื่อผู้ใช้ลงในเครื่อง (localStorage) แล้วพาไปหน้าเกม
                        localStorage.setItem('username', data.user.username);
                        window.location.href = '/';
                    }
                }
            } catch (error) {
                errorElement.innerText = 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้';
            }
        }
    </script>
</body>
</html>
