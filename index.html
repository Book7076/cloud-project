<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-white font-mono flex items-center justify-center min-h-screen p-4 selection:bg-cyan-900">

    <div class="max-w-2xl w-full">
        <!-- 1. หน้าจอเริ่มเกม -->
        <div id="start-screen" class="bg-slate-900 border border-slate-800 p-12 rounded-3xl text-center shadow-[0_0_50px_rgba(0,0,0,0.5)] relative">
            <button onclick="logout()" class="absolute top-6 right-6 text-slate-500 hover:text-red-400 text-sm flex items-center gap-1 transition-colors">
                🚪 ออกจากระบบ
            </button>
            <div class="text-6xl mb-6 text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">⌨️</div>
            <h1 class="text-4xl md:text-6xl font-black mb-2 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                TYPING QUEST
            </h1>
            <p class="text-xl text-emerald-400 mb-6 font-bold">ยินดีต้อนรับ, <span id="player-name">...</span>!</p>
            
            <!-- ส่วนเพิ่มใหม่: เลือกเวลาจับเวลา -->
            <div class="mb-8">
                <p class="text-slate-400 mb-3 text-sm uppercase tracking-widest">เลือกระยะเวลา</p>
                <div class="flex justify-center gap-4">
                    <button onclick="selectTime(15)" id="btn-time-15" class="px-6 py-2 rounded-full border-2 border-slate-700 text-slate-400 hover:border-cyan-500 hover:text-cyan-400 transition-all font-bold">
                        15s
                    </button>
                    <button onclick="selectTime(30)" id="btn-time-30" class="px-6 py-2 rounded-full border-2 border-slate-700 text-slate-400 hover:border-cyan-500 hover:text-cyan-400 transition-all font-bold">
                        30s
                    </button>
                    <!-- ค่าเริ่มต้นคือ 60s เลยใส่สไตล์ Active ไว้ก่อน -->
                    <button onclick="selectTime(60)" id="btn-time-60" class="px-6 py-2 rounded-full border-2 border-cyan-500 text-cyan-400 bg-cyan-500/10 transition-all font-bold">
                        60s
                    </button>
                </div>
            </div>

            <div class="flex justify-center gap-4">
                <button onclick="startGame()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-8 py-4 rounded-full font-bold text-xl transition-all hover:scale-105 shadow-lg">▶ เริ่มเกม</button>
                <button onclick="openLeaderboard()" class="bg-yellow-500 hover:bg-yellow-400 text-slate-950 px-6 py-4 rounded-full font-bold text-lg transition-all hover:scale-105 shadow-lg flex items-center gap-2">🏆 จัดอันดับ</button>
            </div>
            
            <div id="high-score-display" class="mt-8 text-yellow-500 font-bold hidden">🏆 คะแนนสูงสุด: <span id="high-score-val">0</span></div>
        </div>

        <!-- 2. หน้าจอขณะเล่น -->
        <div id="playing-screen" class="hidden space-y-6">
            <div class="flex items-center justify-between bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-lg">
                <div class="text-2xl font-bold text-cyan-400 w-1/3 flex items-center gap-2">
                    <span id="timer-icon">⏱️</span> <span id="timer-text">00:60</span>
                </div>
                <div class="w-1/3 text-center">
                    <span id="combo-badge" class="px-3 py-1 rounded-full text-slate-500 font-bold transition-all">⚡ x<span id="combo-text">1</span> COMBO</span>
                </div>
                <div class="text-right w-1/3 text-3xl font-black text-green-400">
                    <span class="text-sm text-slate-400 font-normal mr-2">SCORE</span><span id="score-text">0</span>
                </div>
            </div>
            <div class="bg-slate-900 border border-slate-800 p-12 rounded-3xl text-center shadow-2xl relative overflow-hidden">
                <div id="time-bar" class="absolute top-0 left-0 h-1 bg-cyan-500 transition-all duration-1000 ease-linear" style="width: 100%"></div>
                <div id="word-loading" class="hidden text-slate-500 text-lg mb-12 animate-pulse">กำลังโหลดคำ...</div>
                <div id="word-display" class="text-5xl md:text-7xl font-bold tracking-widest mb-12 select-none"></div>
                <input id="type-input" type="text" autocomplete="off" spellcheck="false" class="w-full bg-slate-950 border-2 border-slate-700 focus:border-cyan-500 text-center text-2xl py-4 rounded-xl text-white outline-none transition-colors" placeholder="พิมพ์ที่นี่..." />
                <div id="api-status" class="mt-4 text-xs text-slate-600">🌐 Datamuse API</div>
            </div>
        </div>

        <!-- 3. หน้าจอจบเกม -->
        <div id="end-screen" class="hidden bg-slate-900 border border-slate-800 p-12 rounded-3xl text-center shadow-2xl">
            <h2 class="text-3xl font-bold text-red-400 mb-2">หมดเวลา!</h2>
            <div class="text-slate-400 mb-2 mt-8 uppercase tracking-widest text-sm">คะแนนที่ได้</div>
            <div id="final-score" class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-500 mb-8">0</div>
            <button onclick="window.location.reload()" class="bg-slate-100 hover:bg-white text-slate-900 px-8 py-4 rounded-full font-bold text-xl transition-all hover:scale-105">
                🏠 กลับหน้าแรก
            </button>
        </div>

        <!-- 4. หน้าจอจัดอันดับ (Leaderboard) -->
        <div id="leaderboard-screen" class="hidden bg-slate-900 border border-slate-800 p-12 rounded-3xl text-center shadow-2xl relative">
            <h2 class="text-3xl font-black text-yellow-400 mb-6 flex items-center justify-center gap-2">
                🏆 Top 10 Leaderboard
            </h2>
            <!-- พื้นที่แสดงรายชื่อ -->
            <div id="leaderboard-list" class="space-y-3 mb-8 text-left h-64 overflow-y-auto pr-2 custom-scrollbar">
                <!-- ข้อมูลจะถูกดึงมาใส่ตรงนี้ -->
            </div>
            <button onclick="showScreen('start-screen')" class="bg-slate-100 hover:bg-white text-slate-900 px-8 py-3 rounded-full font-bold transition-all hover:scale-105">
                🏠 กลับหน้าแรก
            </button>
        </div>
    </div>

    <script>
        // 1. ระบบตรวจสอบสิทธิ์ (ถ้าไม่ล็อกอินให้ไปหน้า login)
        const currentUser = localStorage.getItem('username');
        if (!currentUser) {
            window.location.href = '/login'; 
        } else {
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('player-name').innerText = currentUser;
                const savedScore = localStorage.getItem(`highScore_${currentUser}`);
                if (savedScore) {
                    document.getElementById('high-score-display').classList.remove('hidden');
                    document.getElementById('high-score-val').innerText = savedScore;
                }
            });
        }

        function logout() { localStorage.removeItem('username'); window.location.href = '/login'; }

        // 2. ระบบเกมเพลย์
        const FALLBACK_WORDS = ['javascript', 'developer', 'frontend', 'backend', 'database', 'keyboard', 'monster', 'treasure', 'server', 'cloud', 'network', 'function', 'variable', 'object'];
        
        let score = 0;
        let gameDuration = 60; // เก็บเวลาที่เลือกว่ากี่วินาที
        let timeLeft = 60; 
        let combo = 1;
        let currentWord = '';
        let timerInterval;
        let isFetching = false;

        // ฟังก์ชันเลือกเวลาและเปลี่ยนสีปุ่ม
        function selectTime(seconds) {
            gameDuration = seconds;
            const times = [15, 30, 60];
            
            times.forEach(t => {
                const btn = document.getElementById(`btn-time-${t}`);
                if (t === seconds) {
                    // ปุ่มที่ถูกเลือก
                    btn.className = "px-6 py-2 rounded-full border-2 border-cyan-500 text-cyan-400 bg-cyan-500/10 transition-all font-bold";
                } else {
                    // ปุ่มที่ไม่ได้เลือก
                    btn.className = "px-6 py-2 rounded-full border-2 border-slate-700 text-slate-400 hover:border-cyan-500 hover:text-cyan-400 transition-all font-bold";
                }
            });
        }

        function showScreen(id) {
            ['start-screen', 'playing-screen', 'end-screen', 'leaderboard-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // ฟังก์ชันดึงและแสดงข้อมูล Leaderboard
        async function openLeaderboard() {
            showScreen('leaderboard-screen');
            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '<div class="text-center text-slate-400 mt-10 animate-pulse">กำลังโหลดข้อมูล...</div>';

            try {
                const res = await fetch('/api/leaderboard');
                if(!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();

                if(data.length === 0) {
                    listEl.innerHTML = '<div class="text-center text-slate-500 mt-10">ยังไม่มีข้อมูลคะแนน</div>';
                    return;
                }

                listEl.innerHTML = data.map((user, index) => {
                    let medal = '';
                    if(index === 0) medal = '🥇';
                    else if(index === 1) medal = '🥈';
                    else if(index === 2) medal = '🥉';
                    else medal = `<span class="w-6 inline-block text-center text-slate-500">${index + 1}</span>`;

                    // ไฮไลท์สีให้ชื่อของเราเอง
                    const isMe = user.username === currentUser ? 'bg-cyan-900/40 border-cyan-500/50' : 'bg-slate-800 border-slate-700';

                    return `
                        <div class="flex justify-between items-center p-3 rounded-xl border ${isMe}">
                            <div class="flex items-center gap-3">
                                <span class="text-xl">${medal}</span>
                                <span class="font-bold ${user.username === currentUser ? 'text-cyan-400' : 'text-slate-200'}">${user.username}</span>
                            </div>
                            <div class="font-black text-green-400">${user.highScore}</div>
                        </div>
                    `;
                }).join('');

            } catch(e) {
                listEl.innerHTML = '<div class="text-center text-red-500 mt-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
            }
        }

        function startGame() {
            score = 0; 
            timeLeft = gameDuration; // ตั้งเวลาตามที่ผู้เล่นเลือก
            combo = 1;
            
            document.getElementById('score-text').innerText = score;
            document.getElementById('timer-text').innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
            document.getElementById('time-bar').style.width = '100%';
            
            generateWord(); 
            showScreen('playing-screen');
            
            const typeInput = document.getElementById('type-input');
            typeInput.value = ''; 
            typeInput.focus();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('timer-text').innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
            // คำนวณหลอดเวลาโดยอิงจาก gameDuration ที่ตั้งไว้
            document.getElementById('time-bar').style.width = `${(timeLeft / gameDuration) * 100}%`;
            
            const timerIcon = document.getElementById('timer-icon');
            if (timeLeft <= 10) {
                document.getElementById('timer-text').className = 'text-2xl font-bold text-red-500';
                timerIcon.classList.add('animate-pulse');
            } else {
                document.getElementById('timer-text').className = 'text-2xl font-bold text-cyan-400';
                timerIcon.classList.remove('animate-pulse');
            }

            if (timeLeft <= 0) endGame();
        }

        async function generateWord() {
            if (isFetching) return; isFetching = true;
            document.getElementById('word-display').classList.add('hidden');
            document.getElementById('word-loading').classList.remove('hidden');
            try {
                const letter = String.fromCharCode(97 + Math.floor(Math.random()*26));
                const res = await fetch(`https://api.datamuse.com/words?sp=${letter}???*&max=20`);
                const data = await res.json();
                
                const validWords = data.filter(item => /^[a-z]+$/.test(item.word));
                if(validWords.length > 0) {
                    currentWord = validWords[Math.floor(Math.random()*validWords.length)].word.toLowerCase();
                } else {
                    throw new Error('No valid words');
                }
                
                document.getElementById('api-status').textContent = '🌐 Datamuse API ✓';
                document.getElementById('api-status').className = 'mt-4 text-xs text-slate-600';
                renderWord();
            } catch (e) { 
                currentWord = FALLBACK_WORDS[Math.floor(Math.random()*FALLBACK_WORDS.length)]; 
                document.getElementById('api-status').textContent = '⚠️ Offline Mode (Fallback)';
                document.getElementById('api-status').className = 'mt-4 text-xs text-red-700';
                renderWord(); 
            }
            finally {
                isFetching = false;
                document.getElementById('word-loading').classList.add('hidden');
                document.getElementById('word-display').classList.remove('hidden');
            }
        }

        function renderWord() {
            const val = document.getElementById('type-input').value.toLowerCase();
            document.getElementById('word-display').innerHTML = currentWord.split('').map((c, i) => {
                let colorClass = 'text-slate-400';
                if (i < val.length) {
                    colorClass = val[i] === c ? 'text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]' : 'text-red-500 bg-red-500/20 rounded';
                }
                return `<span class="${colorClass} transition-colors duration-100">${c}</span>`;
            }).join('');
        }

        document.getElementById('type-input').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            e.target.value = val;
            
            let isTypo = false;
            for (let i = 0; i < val.length; i++) {
                if (val[i] !== currentWord[i]) { isTypo = true; break; }
            }

            if (isTypo) combo = 1;
            
            const comboBadge = document.getElementById('combo-badge');
            document.getElementById('combo-text').innerText = combo;
            comboBadge.className = combo > 1 
                ? 'px-3 py-1 rounded-full font-bold transition-all bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 scale-110' 
                : 'px-3 py-1 rounded-full font-bold transition-all text-slate-500';

            if (val === currentWord) {
                score += (10 * combo); 
                combo = Math.min(combo + 1, 5);
                document.getElementById('score-text').innerText = score;
                e.target.value = ''; generateWord();
            } else { 
                renderWord(); 
            }
        });

        async function endGame() {
            clearInterval(timerInterval);
            document.getElementById('final-score').innerText = score;
            showScreen('end-screen');
            
            // อัปเดตคะแนนลงฐานข้อมูล
            try {
                await fetch('/api/save-score', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: currentUser, score: score})
                });
                // หลังจากส่งบันทึก ให้อัปเดตคะแนนใน localStorage เครื่องด้วย
                const currentHigh = parseInt(localStorage.getItem(`highScore_${currentUser}`) || '0');
                if (score > currentHigh) {
                    localStorage.setItem(`highScore_${currentUser}`, score);
                }
            } catch (e) {
                console.error("Failed to save score to cloud");
            }
        }
    </script>
</body>
</html>
