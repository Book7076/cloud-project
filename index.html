<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-slate-950 text-white font-mono flex items-center justify-center min-h-screen p-4 selection:bg-cyan-900">

    <div class="max-w-2xl w-full">
        
        <!-- 1. หน้าจอเริ่มเกม -->
        <div id="start-screen" class="bg-slate-900 border border-slate-800 p-12 rounded-3xl text-center shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="text-6xl mb-6 text-cyan-400 drop-shadow-[0_0_15px_rgba(34,211,238,0.5)]">⌨️</div>
            <h1 class="text-4xl md:text-6xl font-black mb-4 tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                TYPING QUEST
            </h1>
            <p class="text-slate-400 mb-8 text-lg">
                พิมพ์คำศัพท์ให้เร็วและแม่นยำที่สุดภายใน 60 วินาที<br/>
                พิมพ์ต่อเนื่องเพื่อสะสม <span class="text-yellow-400 font-bold">Combo Multiplier!</span>
            </p>
            <button onclick="startGame()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-8 py-4 rounded-full font-bold text-xl transition-all hover:scale-105 flex items-center justify-center gap-2 mx-auto shadow-[0_0_20px_rgba(34,211,238,0.4)]">
                ▶ เริ่มเกม
            </button>
            <div id="high-score-display" class="mt-8 text-yellow-500 font-bold hidden">
                🏆 คะแนนสูงสุด: <span id="high-score-val">0</span>
            </div>
        </div>

        <!-- 2. หน้าจอขณะเล่น -->
        <div id="playing-screen" class="hidden space-y-6">
            <div class="flex items-center justify-between bg-slate-900 p-4 rounded-2xl border border-slate-800 shadow-lg">
                <div class="flex items-center gap-3 w-1/3">
                    <span id="timer-icon" class="text-xl">⏱️</span>
                    <span id="timer-text" class="text-2xl font-bold text-cyan-400">00:60</span>
                </div>
                <div class="w-1/3 text-center">
                    <div id="combo-badge" class="inline-flex items-center gap-1 px-3 py-1 rounded-full font-bold text-lg text-slate-500 transition-all">
                        ⚡ x<span id="combo-text">1</span> COMBO
                    </div>
                </div>
                <div class="flex items-center justify-end gap-2 w-1/3">
                    <span class="text-slate-400">SCORE</span>
                    <span id="score-text" class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-500">0</span>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-12 rounded-3xl text-center shadow-2xl relative overflow-hidden">
                <div id="time-bar" class="absolute top-0 left-0 h-1 bg-cyan-500 transition-all duration-1000 ease-linear" style="width: 100%"></div>
                <div id="word-display" class="text-5xl md:text-7xl font-bold tracking-widest mb-12 select-none"></div>
                <input
                    id="type-input"
                    type="text"
                    autocomplete="off"
                    spellcheck="false"
                    class="w-full bg-slate-950 border-2 border-slate-700 focus:border-cyan-500 text-center text-2xl py-4 rounded-xl text-white outline-none transition-colors"
                    placeholder="พิมพ์ที่นี่..."
                />
            </div>
        </div>

        <!-- 3. หน้าจอจบเกม -->
        <div id="end-screen" class="hidden bg-slate-900 border border-slate-800 p-12 rounded-3xl text-center shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <h2 class="text-3xl font-bold text-red-400 mb-2">หมดเวลา!</h2>
            <div class="my-8">
                <div class="text-slate-400 mb-2 uppercase tracking-widest text-sm">คะแนนที่ได้</div>
                <div id="final-score" class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-cyan-500 mb-4">0</div>
                <div id="new-record-badge" class="hidden inline-flex items-center gap-2 bg-yellow-500/20 text-yellow-400 px-4 py-2 rounded-full font-bold animate-bounce">
                    🏆 สร้างสถิติใหม่!
                </div>
                <div id="end-high-score" class="text-slate-500 mt-2">คะแนนสูงสุด: 0</div>
            </div>
            <button onclick="startGame()" class="bg-slate-100 hover:bg-white text-slate-900 px-8 py-4 rounded-full font-bold text-xl transition-all hover:scale-105 flex items-center justify-center gap-2 mx-auto">
                🔄 เล่นอีกครั้ง
            </button>
        </div>

    </div>

    <script>
        const WORD_LIST = [
            'javascript', 'developer', 'frontend', 'backend', 'database',
            'gamification', 'keyboard', 'monitor', 'software', 'hardware',
            'challenge', 'adventure', 'warrior', 'magic', 'crystal',
            'monster', 'treasure', 'dungeon', 'castle', 'shield',
            'mongodb', 'server', 'cloud', 'network', 'function'
        ];

        let score = 0;
        let timeLeft = 60;
        let combo = 1;
        let highScore = 0;
        let currentWord = '';
        let timerInterval;

        const startScreen   = document.getElementById('start-screen');
        const playingScreen = document.getElementById('playing-screen');
        const endScreen     = document.getElementById('end-screen');
        const wordDisplay   = document.getElementById('word-display');
        const typeInput     = document.getElementById('type-input');
        const scoreText     = document.getElementById('score-text');
        const comboText     = document.getElementById('combo-text');
        const comboBadge    = document.getElementById('combo-badge');
        const timerText     = document.getElementById('timer-text');
        const timerIcon     = document.getElementById('timer-icon');
        const timeBar       = document.getElementById('time-bar');

        function showScreen(screenId) {
            startScreen.classList.add('hidden');
            playingScreen.classList.add('hidden');
            endScreen.classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function startGame() {
            score = 0;
            timeLeft = 60;
            combo = 1;

            updateScoreUI();
            updateComboUI();
            updateTimeUI();

            generateWord();
            showScreen('playing-screen');

            typeInput.value = '';
            typeInput.focus();

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            updateTimeUI();
            if (timeLeft <= 0) endGame();
        }

        function updateTimeUI() {
            // ✅ แก้ไข: ใช้ backtick ถูกต้อง
            timerText.innerText = `00:${timeLeft.toString().padStart(2, '0')}`;
            timeBar.style.width = `${(timeLeft / 60) * 100}%`;

            if (timeLeft <= 10) {
                timerText.classList.remove('text-cyan-400');
                timerText.classList.add('text-red-500');
                timerIcon.classList.add('animate-pulse');
            } else {
                timerText.classList.remove('text-red-500');
                timerText.classList.add('text-cyan-400');
                timerIcon.classList.remove('animate-pulse');
            }
        }

        function generateWord() {
            const randomIndex = Math.floor(Math.random() * WORD_LIST.length);
            currentWord = WORD_LIST[randomIndex];
            renderWord();
        }

        function renderWord() {
            const userInput = typeInput.value.toLowerCase();
            let html = '';

            for (let i = 0; i < currentWord.length; i++) {
                const char = currentWord[i];
                let colorClass = 'text-slate-400';

                if (i < userInput.length) {
                    if (userInput[i] === char) {
                        colorClass = 'text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.8)]';
                    } else {
                        colorClass = 'text-red-500 bg-red-500/20 rounded';
                    }
                }
                // ✅ แก้ไข: ใช้ backtick ถูกต้อง
                html += `<span class="transition-colors duration-100 ${colorClass}">${char}</span>`;
            }
            wordDisplay.innerHTML = html;
        }

        typeInput.addEventListener('input', (e) => {
            const userInput = e.target.value.toLowerCase();
            typeInput.value = userInput;

            let isTypo = false;
            for (let i = 0; i < userInput.length; i++) {
                if (userInput[i] !== currentWord[i]) {
                    isTypo = true;
                    break;
                }
            }

            if (isTypo) {
                combo = 1;
                updateComboUI();
            }

            if (userInput === currentWord) {
                score += (10 * combo);
                combo = Math.min(combo + 1, 5);

                updateScoreUI();
                updateComboUI();

                typeInput.value = '';
                generateWord();
            } else {
                renderWord();
            }
        });

        function updateScoreUI() {
            scoreText.innerText = score;
        }

        function updateComboUI() {
            comboText.innerText = combo;
            if (combo > 1) {
                comboBadge.className = 'inline-flex items-center gap-1 px-3 py-1 rounded-full font-bold text-lg transition-all bg-yellow-500/20 text-yellow-400 border border-yellow-500/50 scale-110';
            } else {
                comboBadge.className = 'inline-flex items-center gap-1 px-3 py-1 rounded-full font-bold text-lg transition-all text-slate-500';
            }
        }

        function endGame() {
            clearInterval(timerInterval);

            document.getElementById('final-score').innerText = score;

            const newRecordBadge = document.getElementById('new-record-badge');
            if (score > highScore && score > 0) {
                highScore = score;
                newRecordBadge.classList.remove('hidden');
                document.getElementById('high-score-display').classList.remove('hidden');
                document.getElementById('high-score-val').innerText = highScore;
            } else {
                newRecordBadge.classList.add('hidden');
            }

            // ✅ แก้ไข: ใช้ backtick ถูกต้อง
            document.getElementById('end-high-score').innerText = `คะแนนสูงสุด: ${Math.max(score, highScore)}`;
            showScreen('end-screen');
        }
    </script>
</body>
</html>
